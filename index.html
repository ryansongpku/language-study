<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="每日三句">
<meta name="theme-color" content="#6c5ce7">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>每日三句 · 多语言学习</title>
<style>
  @font-face{
    font-family:"Noto Sans Mongolian";
    src:url("NotoSansMongolian-Regular.ttf") format("truetype");
    font-display:swap;
  }
  :root{
    --bg:#f4f4fb; --bg2:#ececfa;
    --card:#ffffff; --ink:#1d1d2b; --muted:#7b7b8e;
    --line:#ececf3; --accent:#6c5ce7; --accent-soft:#efecff;
    --simple:#16a37a; --simple-soft:#e3f6ef;
    --complex:#d97706; --complex-soft:#fdf0dd;
    --shadow:0 10px 30px rgba(40,30,90,.08);
    --radius:22px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#101019; --bg2:#16162a;
      --card:#1b1b2b; --ink:#f1f1f6; --muted:#9a9ab0;
      --line:#2a2a40; --accent:#9b8cff; --accent-soft:#262248;
      --simple:#34d399; --simple-soft:#16352c;
      --complex:#fbbf24; --complex-soft:#3a2d12;
      --shadow:0 10px 30px rgba(0,0,0,.35);
    }
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro","Segoe UI",Roboto,"PingFang SC","Hiragino Sans","Noto Sans Mongolian",sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg,var(--bg2),var(--bg) 240px);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:680px; margin:0 auto; padding:0 16px calc(48px + env(safe-area-inset-bottom));}

  /* Header */
  header{padding:calc(20px + env(safe-area-inset-top)) 4px 8px;}
  .kicker{font-size:13px; font-weight:600; letter-spacing:.08em; color:var(--accent); text-transform:uppercase;}
  h1{font-size:30px; line-height:1.15; margin:6px 0 4px; font-weight:800; letter-spacing:-.02em;}
  .date{font-size:14px; color:var(--muted);}
  .sample-tag{
    display:inline-block; margin-left:8px; font-size:11px; font-weight:700;
    color:var(--complex); background:var(--complex-soft); padding:2px 8px; border-radius:999px;
    vertical-align:middle;
  }

  /* Language pills */
  .langbar{
    position:sticky; top:0; z-index:5;
    margin:14px -16px 18px; padding:10px 16px;
    display:flex; gap:8px; overflow-x:auto; scrollbar-width:none;
    background:linear-gradient(180deg,var(--bg2) 60%,transparent);
    backdrop-filter:saturate(140%) blur(8px);
  }
  .langbar::-webkit-scrollbar{display:none;}
  .pill{
    flex:0 0 auto; border:1px solid var(--line); background:var(--card);
    color:var(--muted); font-size:15px; font-weight:600;
    padding:9px 16px; border-radius:999px; cursor:pointer;
    transition:all .18s ease; white-space:nowrap;
  }
  .pill.active{background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 6px 16px rgba(108,92,231,.35);}

  /* Cards */
  .card{
    background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow);
    padding:20px 20px 18px; margin-bottom:16px; border:1px solid var(--line);
    animation:rise .4s cubic-bezier(.2,.7,.3,1) both;
  }
  @keyframes rise{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}
  .badge{
    display:inline-flex; align-items:center; gap:6px;
    font-size:12px; font-weight:700; padding:4px 11px; border-radius:999px; letter-spacing:.02em;
  }
  .badge.simple{color:var(--simple); background:var(--simple-soft);}
  .badge.complex,.badge.medium{color:var(--complex); background:var(--complex-soft);}
  .num{font-size:12px; color:var(--muted); font-weight:600; float:right; margin-top:5px;}

  .zh{font-size:26px; line-height:1.5; font-weight:700; margin:14px 0 4px; letter-spacing:-.01em;}
  .hint{font-size:13.5px; color:var(--muted); margin:8px 0 0; display:flex; align-items:center; gap:6px;}

  /* The prominent Chinese-sentence header at the top of each tab. */
  .sentence-head{padding-bottom:18px;}
  /* Per-language section title inside a card. */
  .lang-title{font-size:17px; font-weight:800; letter-spacing:-.01em; margin:0 0 12px; display:flex; align-items:center; gap:8px;}
  .lang-title .dot{width:8px; height:8px; border-radius:50%; background:var(--accent);}

  .step{margin-top:10px;}
  .reveal-btn{
    width:100%; text-align:left; cursor:pointer; user-select:none;
    border:1px dashed var(--line); background:transparent; color:var(--accent);
    font-size:15px; font-weight:700; padding:13px 16px; border-radius:14px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    transition:background .15s;
  }
  .reveal-btn:hover{background:var(--accent-soft);}
  .reveal-btn .chev{transition:transform .2s; opacity:.6; font-weight:600;}

  .panel{overflow:hidden; max-height:0; opacity:0; transition:max-height .35s ease, opacity .3s ease, margin .25s;}
  .panel.open{max-height:1200px; opacity:1; margin-top:4px;}

  .trans{
    font-size:21px; line-height:1.6; font-weight:600; padding:14px 16px;
    background:var(--accent-soft); border-radius:14px; color:var(--ink);
  }
  .pron{display:block; margin-top:8px; font-size:14px; font-weight:500; color:var(--muted); font-style:italic; letter-spacing:.01em;}
  /* Traditional Mongolian: vertical, top-to-bottom, columns left-to-right. */
  .trans .vert{
    writing-mode:vertical-lr; -webkit-writing-mode:vertical-lr;
    display:block; height:240px; overflow-x:auto; overflow-y:hidden;
    font-size:26px; line-height:1.5; padding:6px 2px;
    font-family:"Noto Sans Mongolian","MN Baiti","Mongolian Baiti","Menksoft","Oyun Gurban",sans-serif;
  }

  .explain{
    font-size:15px; line-height:1.75; padding:14px 16px; margin-top:2px;
    background:linear-gradient(180deg,var(--accent-soft),transparent); border-radius:14px;
  }
  .explain p{margin:0 0 8px;}
  .explain p:last-child{margin:0;}
  .explain b{color:var(--accent);}

  .empty{padding:60px 20px; text-align:center; color:var(--muted);}
  .empty h2{font-size:18px; color:var(--ink);}
  footer{text-align:center; color:var(--muted); font-size:12px; margin-top:24px; line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">每日三句 · Daily Three</div>
    <h1 id="title">今日学习</h1>
    <div class="date"><span id="date">—</span><span id="sampleTag"></span></div>
  </header>

  <nav class="langbar" id="langbar"></nav>
  <main id="cards"></main>

  <footer>
    一句简单 · 两句中等 &nbsp;|&nbsp; 中文 → 思考 → 翻译 → 讲解<br>
    每天由 Claude 自动生成
  </footer>
</div>

<script>
let DATA = null, currentSentence = 0;
const state = {};   // key `${si}:${lang}:${step}` -> bool
const LEVELS = {
  simple:  {text:"简单 · Simple", short:"简单", cls:"simple"},
  medium:  {text:"中等 · Medium", short:"中等", cls:"medium"},
  complex: {text:"中等 · Medium", short:"中等", cls:"medium"},  // legacy alias
};
function levelOf(s){ return LEVELS[s.level] || LEVELS.medium; }

// Render explanation into paragraphs, bolding the leading ①生字：/②语法：/③… label.
// Splits at each ①②③④⑤ marker, so it works whether the parts are newline-
// separated or run together on one line.
function fmtExplain(text){
  const s = String(text).trim();
  let parts = s.split(/(?=[①②③④⑤])/).map(p=>p.trim()).filter(Boolean);
  if(parts.length <= 1) parts = s.split(/\n+/).map(p=>p.trim()).filter(Boolean);
  const br = t => escapeHtml(t).replace(/\n/g,"<br>");
  return parts.map(p=>{
    const m = p.match(/^([①②③④⑤])\s*([^：:\n]{0,16}[：:])?\s*([\s\S]*)$/);
    if(m){ const lead = (m[1] + (m[2]||"")).trim();
      return `<p><b>${escapeHtml(lead)}</b> ${br(m[3].trim())}</p>`; }
    return `<p>${br(p)}</p>`;
  }).join("");
}
function escapeHtml(s){return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

// One tab per sentence.
function renderTabs(){
  const bar = document.getElementById("langbar");
  bar.innerHTML = "";
  DATA.sentences.forEach((s, si)=>{
    const lv = levelOf(s);
    const b = document.createElement("button");
    b.className = "pill" + (si===currentSentence?" active":"");
    b.textContent = `${si+1} · ${lv.short}`;
    b.onclick = ()=>{ currentSentence = si; renderTabs(); renderSentence(); window.scrollTo({top:0,behavior:"smooth"}); };
    bar.appendChild(b);
  });
}

// For the selected sentence: the Chinese sentence + a card per language.
function renderSentence(){
  const root = document.getElementById("cards");
  root.innerHTML = "";
  const si = currentSentence;
  const s = DATA.sentences[si];
  const lv = levelOf(s);

  const head = document.createElement("div");
  head.className = "card sentence-head";
  head.innerHTML = `
    <span class="badge ${lv.cls}">${lv.text}</span>
    <span class="num">${si+1} / ${DATA.sentences.length}</span>
    <div class="zh">${escapeHtml(s.zh)}</div>
    <div class="hint">💭 先想想：分别用下面 ${DATA.languages.length} 种语言怎么说？</div>`;
  root.appendChild(head);

  DATA.languages.forEach((l, li)=>{
    const code = l.code;
    const t = s.translations[code];
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = ((li+1)*0.05)+"s";

    const kTrans = `${si}:${code}:trans`;
    const kExp   = `${si}:${code}:exp`;
    const openTrans = !!state[kTrans], openExp = !!state[kExp];

    const pronHtml = (t && t.pron) ? `<span class="pron">${escapeHtml(t.pron)}</span>` : "";
    const transText = t ? (code==="mn"
        ? `<span class="vert">${escapeHtml(t.text)}</span>`
        : escapeHtml(t.text)) : "—";

    card.innerHTML = `
      <div class="lang-title"><span class="dot"></span>${escapeHtml(l.native)}</div>

      <div class="step">
        <button class="reveal-btn" data-k="${kTrans}">
          <span>① 看标准翻译</span><span class="chev">${openTrans?"收起 ▲":"展开 ▾"}</span>
        </button>
        <div class="panel ${openTrans?'open':''}">
          <div class="trans">${transText}${pronHtml}</div>
        </div>
      </div>

      <div class="step">
        <button class="reveal-btn" data-k="${kExp}">
          <span>② 看讲解（生字 · 语法 · 为什么）</span><span class="chev">${openExp?"收起 ▲":"展开 ▾"}</span>
        </button>
        <div class="panel ${openExp?'open':''}">
          <div class="explain">${t?fmtExplain(t.explanation):"—"}</div>
        </div>
      </div>
    `;
    root.appendChild(card);

    card.querySelectorAll(".reveal-btn").forEach(btn=>{
      btn.onclick = ()=>{
        const k = btn.dataset.k;
        state[k] = !state[k];
        const panel = btn.nextElementSibling;
        panel.classList.toggle("open", state[k]);
        btn.querySelector(".chev").textContent = state[k] ? "收起 ▲" : "展开 ▾";
      };
    });
  });
}

async function init(){
  try{
    const res = await fetch("content.json?ts="+Date.now());
    DATA = await res.json();
  }catch(e){
    document.getElementById("cards").innerHTML =
      `<div class="empty"><h2>还没有内容</h2><p>运行 <code>generate.py</code> 生成今天的句子。</p></div>`;
    return;
  }
  document.getElementById("date").textContent = DATA.date || "";
  if(DATA.sample){
    document.getElementById("sampleTag").innerHTML = `<span class="sample-tag">示例内容</span>`;
  }
  currentSentence = 0;
  renderTabs();
  renderSentence();
}

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
init();
</script>
</body>
</html>
