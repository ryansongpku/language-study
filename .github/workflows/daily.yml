name: Daily content + deploy

on:
  schedule:
    # 22:00 UTC = 06:00 北京时间（次日）。每天早上自动生成当天内容。
    - cron: "0 22 * * *"
  workflow_dispatch: {}   # 也可在 Actions 页面手动触发
  push:
    branches: [main]      # 改动代码推上来时也重新部署

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install anthropic

      - name: Generate today's content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TZ: Asia/Shanghai
        run: python generate.py

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html content.json manifest.json sw.js _site/
          cp *.png *.ttf _site/
          cp -r .well-known _site/ 2>/dev/null || true

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
